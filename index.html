<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>João Costa — Jornalista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: rgb(12, 35, 93);
      --bg:     #F9F7F4;
      --ink:    #1A1A18;
      --muted:  #606060;
      --rule:   #E0DDD8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .name {
      font-family: "Nunito Sans", sans-serif;
      font-size: 1.8rem;
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
    }
    .name span { color: var(--accent); }
    .role {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }
    .divider {
      width: 32px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 2.5rem;
    }
    .status {
      font-family: "Nunito Sans", sans-serif;
      font-size: 1.05rem;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
    }
    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.74rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--rule);
      padding: 0.4rem 0.85rem;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .link-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .link-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
    .footer-note {
      margin-top: 3.5rem;
      font-size: 0.7rem;
      color: var(--rule);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1 class="name">João Santos Costa</h1>
    <p class="role">Jornalista · RTP</p>
    <div class="divider"></div>
    <p class="status">Portfólio em atualização.</p>

    <div class="links">
      <a class="link-btn" href="mailto:joao.s.costa@ext.rtp.pt" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        Email
      </a>
      <a class="link-btn" href="https://www.linkedin.com/in/joaohsc" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="20" rx="3"/>
          <path d="M7 10v7M7 7v.01M12 17v-4.5A2.5 2.5 0 0 1 17 15v2"/>
        </svg>
        LinkedIn
      </a>
      <a class="link-btn" href="https://x.com/joaohscosta" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4l16 16M20 4L4 20"/>
        </svg>
        @joaohscosta
      </a>
    </div>
  </div>

  <p class="footer-note">© 2026 João Santos Costa</p>

</body>
</html>
